<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Results Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="results.css" />
</head>
<body>
  <header class="top-nav">
    <nav class="nav-inner" aria-label="Main">
      <a href="index.html" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        Home
      </a>
      <a href="#" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Students
      </a>
      <a href="#" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Subjects
      </a>
      <a href="results.html" class="nav-link nav-link--active" aria-current="page">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
        Results
      </a>
      <a href="#" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </a>
      <a href="index.html" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        Rankings
      </a>
    </nav>
  </header>

  <main class="page">
    <div class="page-head">
      <div class="page-head__text">
        <h1>Results Management</h1>
        <p class="subtitle">Enter and manage student grades</p>
      </div>
      <button type="button" class="btn btn--primary" id="btn-new-result" aria-haspopup="dialog">
        + New Result
      </button>
    </div>

    <section class="card">
      <div class="card__header">
        <h2>Results List</h2>
        <p class="card__count" id="results-count" aria-live="polite">0 result(s) recorded</p>
      </div>
      <div class="table-wrap">
        <table class="results-table">
          <thead>
            <tr>
              <th>Student Code</th>
              <th>Student Name</th>
              <th>Subject Code</th>
              <th>Subject Name</th>
              <th>Grade</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="modal-backdrop" hidden></div>
  <div class="modal" id="modal-new" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal__panel">
      <div class="modal__head">
        <h2 id="modal-title">Add new result</h2>
        <button type="button" class="modal__close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <form id="form-new-result" class="modal__form">
        <label class="field">
          <span class="field__label">Student Code</span>
          <input type="text" name="studentCode" required maxlength="10" autocomplete="off" placeholder="E001" />
        </label>
        <label class="field">
          <span class="field__label">Student Name</span>
          <input type="text" name="studentName" required maxlength="80" placeholder="Full name" />
        </label>
        <label class="field">
          <span class="field__label">Subject Code</span>
          <input type="text" name="subjectCode" required maxlength="10" placeholder="M001" />
        </label>
        <label class="field">
          <span class="field__label">Subject Name</span>
          <input type="text" name="subjectName" required maxlength="80" placeholder="Mathematics" />
        </label>
        <label class="field">
          <span class="field__label">Grade (out of 20)</span>
          <input type="number" name="grade" required min="0" max="20" step="0.01" placeholder="16" />
        </label>
        <div class="modal__actions">
          <button type="button" class="btn btn--ghost" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn--primary">Save result</button>
        </div>
      </form>
    </div>
  </div>

  <script src="results.js"></script>
</body>
</html>
